<!DOCTYPE html>
<html lang="ar">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>For You Abdulrahman 🧸❤️</title>  
    <link rel="preconnect" href="https://fonts.googleapis.com">  
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cairo:wght@600;900&display=swap" rel="stylesheet">  
    <style>  
    * { margin: 0; padding: 0; box-sizing: border-box; }  

    body {  
        display: flex;  
        justify-content: center;  
        align-items: center;  
        min-height: 100vh;  
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);  
        overflow-y: auto;  
        overflow-x: hidden;  
        position: relative;  
        font-family: 'Cairo', sans-serif;  
        padding: 40px 0;
    }  

    .hearts-bg {  
        position: fixed; width: 100%; height: 100%; top: 0; left: 0;  
        pointer-events: none; z-index: 1;  
    }  

    .heart {  
        position: absolute;  
        background: linear-gradient(45deg, #ff6b6b, #ff9a9e);  
        height: 22px; width: 22px;  
        transform: rotate(-45deg); bottom: -50px;  
        border-radius: 50% 50% 0 0;  
        animation: floatUp 0.8s linear infinite;  
        opacity: 0.8;  
        box-shadow: 0 0 15px rgba(255, 107, 107, 0.6);  
    }  

    .heart:before, .heart:after {  
        content: ""; background: linear-gradient(45deg, #ff6b6b, #ff9a9e);  
        border-radius: 50%; height: 22px; position: absolute; width: 22px;  
    }  
    .heart:before { top: -11px; left: 0; }  
    .heart:after { left: 11px; top: 0; }  

    @keyframes floatUp {  
        0% { transform: translateY(0) rotate(-45deg) scale(0.8); opacity: 0; }  
        15% { opacity: 0.8; }  
        100% { transform: translateY(-110vh) rotate(-45deg) scale(1.2); opacity: 0; }  
    }  

    .stars {  
        position: fixed; width: 100%; height: 100%; top: 0; left: 0; 
        pointer-events: none; z-index: 1;  
    }  

    .star {  
        position: absolute; width: 4px; height: 4px;  
        background: #fff; border-radius: 50%;  
        animation: twinkle 0.4s ease-in-out infinite;  
        box-shadow: 0 0 10px #fff, 0 0 20px #ffd700;  
    }  

    @keyframes twinkle {  
        0%, 100% { opacity: 0.3; transform: scale(1); }  
        50% { opacity: 1; transform: scale(1.4); }  
    }  

    .butterflies {  
        position: fixed; width: 100%; height: 100%; top: 0; left: 0; 
        pointer-events: none; z-index: 1;  
    }  

    .butterfly {  
        position: absolute; font-size: 24px;  
        animation: butterflyFly 1.5s linear infinite;  
        opacity: 0.8;  
    }  

    @keyframes butterflyFly {  
        0% { transform: translateX(-100vw) translateY(0) rotate(0deg); opacity: 0; }  
        15% { opacity: 0.8; }  
        85% { opacity: 0.8; }  
        100% { transform: translateX(100vw) translateY(-80px) rotate(360deg); opacity: 0; }  
    }  

    .card {  
        background: rgba(255, 255, 255, 0.15);  
        backdrop-filter: blur(25px);  
        -webkit-backdrop-filter: blur(25px);  
        padding: 50px 30px; border-radius: 40px;  
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(255, 107, 107, 0.2);  
        text-align: center; z-index: 2;  
        max-width: 500px; width: 90%;  
        border: 2px solid rgba(255, 255, 255, 0.3);  
        animation: cardPopIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);  
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 40px;
    }  

    .teddy-container {  
        width: 100%;  
        position: relative; display: flex;  
        justify-content: center; perspective: 1000px;  
    }  

    .teddy-3d {  
        width: 200px; height: 200px;  
        position: relative; transform-style: preserve-3d;  
        animation: teddyRotate 0.6s ease-in-out infinite;  
    }  

    .teddy-face {  
        position: absolute; width: 100%; height: 100%;  
        background: linear-gradient(135deg, #e0c097, #b8956a);  
        border-radius: 50%; display: flex;  
        justify-content: center; align-items: center;  
        box-shadow: inset -15px -15px 30px rgba(0,0,0,0.25), 0 15px 40px rgba(0,0,0,0.35), 0 0 30px rgba(255, 193, 7, 0.4);  
        transform: translateZ(60px);  
    }  

    .teddy-ear {  
        position: absolute; width: 70px; height: 70px;  
        background: linear-gradient(135deg, #e0c097, #b8956a);  
        border-radius: 50%;  
        box-shadow: inset -8px -8px 20px rgba(0,0,0,0.25), 0 5px 15px rgba(0,0,0,0.3);  
    }  
    .ear-left { top: -20px; left: 10px; transform: translateZ(40px); }  
    .ear-right { top: -20px; right: 10px; transform: translateZ(40px); }  

    .teddy-eye {  
        position: absolute; width: 26px; height: 26px;  
        background: radial-gradient(circle, #4a3728, #1a0f0a);  
        border-radius: 50%; top: 65px;  
        box-shadow: 0 5px 15px rgba(0,0,0,0.4), 0 0 10px rgba(255, 255, 255, 0.5);  
    }  
    .eye-left { left: 45px; }  
    .eye-right { right: 45px; }  

    .teddy-nose {  
        position: absolute; width: 44px; height: 30px;  
        background: linear-gradient(to bottom, #8b4513, #5c3317);  
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;  
        top: 95px; box-shadow: 0 8px 20px rgba(0,0,0,0.3);  
    }  

    .teddy-mouth {  
        position: absolute; width: 60px; height: 30px;  
        border-bottom: 5px solid #5c3317;  
        border-radius: 0 0 50% 50%; top: 125px;  
    }  

    .teddy-heart {  
        position: absolute; width: 50px; height: 50px;  
        background: linear-gradient(45deg, #ff6b6b, #ff9a9e);  
        transform: rotate(-45deg); bottom: 25px; left: 50%;  
        transform: translateX(-50%) rotate(-45deg);  
        box-shadow: 0 0 30px rgba(255, 107, 107, 0.8), 0 0 50px rgba(255, 107, 107, 0.5);  
        animation: heartBeat 0.22s ease-in-out infinite;  
    }  

    .teddy-heart:before, .teddy-heart:after {  
        content: ""; position: absolute;  
        width: 50px; height: 50px;  
        background: linear-gradient(45deg, #ff6b6b, #ff9a9e);  
        border-radius: 50%;  
    }  
    .teddy-heart:before { top: -25px; left: 0; }  
    .teddy-heart:after { left: 25px; top: 0; }  

    /* الاستايل الجديد للرسالة المعتذرة الثقيلة */
    .message {  
        font-family: 'Great Vibes', cursive;
        font-size: 2rem; 
        font-weight: 900; 
        color: #fff;  
        text-shadow: 0 0 10px #fff, 0 0 20px #ff6b6b, 0 0 40px #ff6b6b;  
        line-height: 1.4;
        direction: ltr;
        animation: textGlow 0.4s ease-in-out infinite alternate;  
        padding: 0 10px;
    }  

    /* حاويات الأشكال الـ 3D الجديدة بنفس المستوى الاحترافي */
    .showcase-item {
        width: 100%;
        perspective: 1000px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .object-3d {
        width: 180px;
        height: 180px;
        position: relative;
        transform-style: preserve-3d;
        animation: genericRotate 4s linear infinite;
    }

    /* 1. خاتم الحُضن المجسم */
    .ring-3d {
        width: 130px;
        height: 130px;
        border: 14px solid #e0e0e0;
        border-radius: 50%;
        position: absolute;
        transform-style: preserve-3d;
        box-shadow: 0 0 25px rgba(255,255,255,0.4), inset 0 0 15px rgba(0,0,0,0.2);
    }
    .ring-3d::before, .ring-3d::after {
        content: "🖐🏼";
        position: absolute;
        font-size: 32px;
        top: -12px;
    }
    .ring-3d::before { left: 15px; transform: rotate(30deg) translateZ(10px); }
    .ring-3d::after { right: 15px; transform: rotate(-150deg) scaleY(-1) translateZ(-10px); }

    /* 2. الوردة الـ 3D الكيوت */
    .rose-3d {
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .rose-petal {
        position: absolute;
        width: 70px;
        height: 70px;
        background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
        border-radius: 50% 0 50% 50%;
        transform-style: preserve-3d;
        box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }
    .petal-1 { transform: rotate(0deg) translateZ(10px); }
    .petal-2 { transform: rotate(72deg) scale(0.9) translateZ(15px); }
    .petal-3 { transform: rotate(144deg) scale(0.8) translateZ(20px); }
    .petal-4 { transform: rotate(216deg) scale(0.9) translateZ(12px); }
    .petal-5 { transform: rotate(288deg) scale(0.75) translateZ(22px); }
    .rose-center {
        position: absolute;
        width: 35px;
        height: 35px;
        background: #f73859;
        border-radius: 50%;
        transform: translateZ(25px);
        box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
    }
    .rose-stem {
        position: absolute;
        width: 8px;
        height: 100px;
        background: #4caf50;
        bottom: -60px;
        transform: rotateX(90deg);
        border-radius: 4px;
    }

    /* 3. كيس كاندي جيلي لبني شفاف رائع وبداخله حلويات */
    .candy-bag {
        width: 140px;
        height: 180px;
        background: rgba(135, 206, 250, 0.45);
        border: 3px solid rgba(255,255,255,0.6);
        border-radius: 15px 15px 25px 25px;
        backdrop-filter: blur(4px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.2), inset 0 0 20px rgba(255,255,255,0.5);
        position: relative;
        transform-style: preserve-3d;
    }
    .bag-top {
        position: absolute;
        top: -10px; left: -5px; width: 150px; height: 15px;
        background: #87cefa;
        clip-path: polygon(0% 100%, 10% 0%, 20% 100%, 30% 0%, 40% 100%, 50% 0%, 60% 100%, 70% 0%, 80% 100%, 90% 0%, 100% 100%);
    }
    .jelly-pieces {
        position: absolute;
        width: 100%; height: 70%;
        bottom: 10px;
        display: flex; flex-wrap: wrap;
        justify-content: center; align-items: center;
        gap: 8px; padding: 10px;
        transform: translateZ(10px);
    }
    .jelly {
        width: 24px; height: 24px;
        border-radius: 6px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.15), inset -2px -2px 6px rgba(0,0,0,0.2);
        animation: jellyBounce 1s ease-in-out infinite alternate;
    }
    .jelly-1 { background: #ff4757; transform: rotate(15deg); }
    .jelly-2 { background: #ffa502; transform: rotate(-20deg); animation-delay: 0.2s; }
    .jelly-3 { background: #2ed573; font-size: 14px; text-align:center; animation-delay: 0.4s; }
    .jelly-4 { background: #1e90ff; transform: rotate(45deg); animation-delay: 0.1s; }

    /* 4. تذكرة المنتزه المجسمة الفخمة */
    .ticket-3d {
        width: 180px;
        height: 110px;
        background: #fdfaf2;
        border-radius: 12px;
        border-left: 6px dashed #764ba2;
        box-shadow: 0 15px 35px rgba(0,0,0,0.25), inset 0 0 15px rgba(0,0,0,0.05);
        padding: 10px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        color: #2c3e50;
        font-family: 'Cairo', sans-serif;
        border: 1px solid #e2d9c2;
    }
    .ticket-header {
        display: flex; justify-content: space-between;
        font-size: 10px; font-weight: bold;
    }
    .ticket-price { background: #764ba2; color: #fff; padding: 2px 6px; border-radius: 4px; }
    .ticket-title {
        font-size: 15px; font-weight: 900; color: #764ba2; text-align: center; margin-top: 5px;
    }
    .ticket-footer {
        display: flex; justify-content: space-between; align-items: center; font-size: 9px; opacity: 0.8;
    }

    /* الأنميشنز الإضافية والتحسينات لجعل الموقع فائق الكيوت والجمال */
    @keyframes cardPopIn {  
        0% { transform: scale(0.6); opacity: 0; }  
        100% { transform: scale(1); opacity: 1; }  
    }  

    @keyframes teddyRotate {  
        0%, 100% { transform: rotateY(-25deg) rotateX(10deg); }  
        50% { transform: rotateY(25deg) rotateX(-10deg); }  
    }  

    @keyframes genericRotate {
        0% { transform: rotateY(0deg) rotateX(10deg); }
        100% { transform: rotateY(360deg) rotateX(10deg); }
    }

    @keyframes heartBeat {  
        0%, 100% { transform: translateX(-50%) rotate(-45deg) scale(1); }  
        50% { transform: translateX(-50%) rotate(-45deg) scale(1.25); }  
    }  

    @keyframes textGlow {  
        0%, 100% { text-shadow: 0 0 15px #fff, 0 0 30px #ff6b6b, 0 0 45px #ff6b6b; }  
        50% { text-shadow: 0 0 25px #fff, 0 0 40px #ff4757, 0 0 65px #ff4757; }  
    }  

    @keyframes jellyBounce {
        0% { transform: translateY(0) scale(1); }
        100% { transform: translateY(-5px) scale(1.05); }
    }

    .music-btn {  
        position: fixed; bottom: 30px; right: 30px;  
        width: 60px; height: 60px;  
        background: linear-gradient(135deg, #ff6b6b, #ff9a9e);  
        border-radius: 50%; display: flex;  
        justify-content: center; align-items: center;  
        cursor: pointer; z-index: 10;  
        box-shadow: 0 0 30px rgba(255, 107, 107, 0.6);  
        animation: pulse 0.7s ease-in-out infinite;  
        border: 3px solid rgba(255, 255, 255, 0.5);  
    }  
    .music-btn:hover { transform: scale(1.1); }  
    .music-icon { font-size: 30px; color: #fff; }  

    @keyframes pulse {  
        0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 107, 107, 0.6); }  
        50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 107, 107, 0.9); }  
    }  

    /* فواصل ناعمة مضيئة لإعطاء مظهر متناسق وثري */
    .divider {
        width: 60%; height: 2px;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.6), transparent);
        box-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    </style>
</head>  
<body>  
    <div class="hearts-bg" id="heartsContainer"></div>  
    <div class="stars" id="starsContainer"></div>
    <div class="butterflies" id="butterfliesContainer"></div>

    <audio id="musicPlayer">
        <source src="cut_temp.wav" type="audio/wav">
    </audio>

    <div class="music-btn" onclick="toggleMusic()">
        <div class="music-icon" id="musicIcon">🎵</div>
    </div>

    <div class="card">  
        <!-- 1. الدبدوب الكيوت المعتاد -->
        <div class="teddy-container">  
            <div class="teddy-3d">
                <div class="teddy-ear ear-left"></div>
                <div class="teddy-ear ear-right"></div>
                <div class="teddy-face">
                    <div class="teddy-eye eye-left"></div>
                    <div class="teddy-eye eye-right"></div>
                    <div class="teddy-nose"></div>
                    <div class="teddy-mouth"></div>
                    <div class="teddy-heart"></div>
                </div>
            </div>
        </div>  

        <!-- الرسالة الجديدة ثقيلة وواضحة جداً -->
        <div class="message">I'm sorry my lil baby I always do mistakes , but I know you are kind-hearted and you will forgive me</div>  

        <div class="divider"></div>

        <!-- 2. إضافة خاتم الحُضن الفضي 3D -->
        <div class="showcase-item">
            <div class="object-3d">
                <div class="ring-3d"></div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- 3. إضافة الوردة الروز الجميلة 3D -->
        <div class="showcase-item">
            <div class="object-3d rose-3d">
                <div class="rose-petal petal-1"></div>
                <div class="rose-petal petal-2"></div>
                <div class="rose-petal petal-3"></div>
                <div class="rose-petal petal-4"></div>
                <div class="rose-petal petal-5"></div>
                <div class="rose-center"></div>
                <div class="rose-stem"></div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- 4. كيس الكاندي الجيلي اللبني الشفاف المليء بالحلويات والقلوب -->
        <div class="showcase-item">
            <div class="object-3d">
                <div class="candy-bag">
                    <div class="bag-top"></div>
                    <div class="jelly-pieces">
                        <div class="jelly jelly-1"></div>
                        <div class="jelly jelly-2"></div>
                        <div class="jelly jelly-3">💖</div>
                        <div class="jelly jelly-4"></div>
                        <div class="jelly jelly-1" style="animation-delay:0.3s">✨</div>
                        <div class="jelly jelly-2" style="animation-delay:0.5s"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- 5. تذكرة حدائق المنتزه الأيقونية والمظبوطة بالكامل ثلاثية الأبعاد -->
        <div class="showcase-item">
            <div class="object-3d">
                <div class="ticket-3d">
                    <div class="ticket-header">
                        <span class="ticket-price">65 L.E</span>
                        <span>باب رقم 1</span>
                        <span>2026</span>
                    </div>
                    <div class="ticket-title">حدائق المنتزه</div>
                    <div class="ticket-footer">
                        <span>N° 00093326</span>
                        <span>Montazah Gardens</span>
                    </div>
                </div>
            </div>
        </div>

    </div>  

    <script>  
        const container = document.getElementById('heartsContainer');  
        for (let i = 0; i < 18; i++) {  
            const heart = document.createElement('div');  
            heart.classList.add('heart');  
            heart.style.left = Math.random() * 100 + 'vw';  
            heart.style.animationDelay = Math.random() * 0.5 + 's';  
            heart.style.animationDuration = (Math.random() * 0.4 + 0.6) + 's'; 
            const size = (Math.random() * 14) + 12;  
            heart.style.width = size + 'px';  
            heart.style.height = size + 'px';  
            container.appendChild(heart);  
        }  

        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 30; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDelay = Math.random() * 0.3 + 's';
            starsContainer.appendChild(star);
        }

        const butterfliesContainer = document.getElementById('butterfliesContainer');
        const butterflies = ['🦋', '💕', '✨', '💖', '🍭'];
        for (let i = 0; i < 12; i++) {
            const butterfly = document.createElement('div');
            butterfly.classList.add('butterfly');
            butterfly.textContent = butterflies[Math.floor(Math.random() * butterflies.length)];
            butterfly.style.top = (Math.random() * 80 + 10) + 'vh';
            butterfly.style.animationDelay = (Math.random() * 0.5) + 's';
            butterfly.style.animationDuration = (Math.random() * 0.5 + 1.2) + 's'; 
            butterfly.style.fontSize = (Math.random() * 8 + 20) + 'px';
            butterfliesContainer.appendChild(butterfly);
        }

        let isPlaying = false;
        let isBackupMusic = false;
        const musicPlayer = document.getElementById('musicPlayer');
        const musicIcon = document.getElementById('musicIcon');
        
        const backupMusicUrl = "https://assets.mixkit.co/music/preview/mixkit-beautiful-dream-493.mp3";

        function toggleMusic() {
            if (isPlaying) {
                musicPlayer.pause();
                musicIcon.textContent = '🎵';
            } else {
                musicPlayer.play().catch(e => console.log("Error playing"));
                musicPlayer.volume = 0.6;
                musicIcon.textContent = '🔇';
            }
            isPlaying = !isPlaying;
        }

        musicPlayer.addEventListener('ended', function() {
            if (!isBackupMusic) {
                musicPlayer.src = backupMusicUrl;
                musicPlayer.loop = true; 
                musicPlayer.load();
                musicPlayer.play();
                isBackupMusic = true;
            }
        });

        document.addEventListener('click', function() {
            if (!isPlaying) {
                musicPlayer.play().then(() => {
                    isPlaying = true;
                    musicIcon.textContent = '🔇';
                    musicPlayer.volume = 0.6;
                }).catch(e => console.log('Auto-play blocked initially'));
            }
        }, { once: true });
    </script>
</body>  
</html>
