<!DOCTYPE html>
<html lang="ar">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>For You 🧸❤️</title>  
    <link rel="preconnect" href="https://fonts.googleapis.com">  
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">  
    <style>  
    * { margin: 0; padding: 0; box-sizing: border-box; }  

    body {  
        display: flex;  
        justify-content: center;  
        align-items: center;  
        min-height: 100vh;  
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);  
        overflow: hidden;  
        position: relative;  
        font-family: 'Great Vibes', cursive;  
    }  

    .hearts-bg {  
        position: absolute; width: 100%; height: 100%; top: 0; left: 0;  
        pointer-events: none; z-index: 1;  
    }  

    .heart {  
        position: absolute;  
        background: linear-gradient(45deg, #ff6b6b, #ff9a9e);  
        height: 25px; width: 25px;  
        transform: rotate(-45deg); bottom: -50px;  
        border-radius: 50% 50% 0 0;  
        animation: floatUp 1.2s linear infinite; /* تم تسريع صعود القلوب من 3 ثواني لـ 1.2 ثانية */  
        opacity: 0.8;  
        box-shadow: 0 0 20px rgba(255, 107, 107, 0.7);  
    }  

    .heart:before, .heart:after {  
        content: ""; background: linear-gradient(45deg, #ff6b6b, #ff9a9e);  
        border-radius: 50%; height: 25px; position: absolute; width: 25px;  
    }  
    .heart:before { top: -12px; left: 0; }  
    .heart:after { left: 12px; top: 0; }  

    @keyframes floatUp {  
        0% { transform: translateY(0) rotate(-45deg) scale(0.8); opacity: 0; }  
        10% { opacity: 0.8; } /* تعديل بسيط للظهور السريع مع السرعة الجديدة */
        100% { transform: translateY(-110vh) rotate(-45deg) scale(1.3); opacity: 0; }  
    }  

    .stars {  
        position: absolute; width: 100%; height: 100%;  
        pointer-events: none; z-index: 1;  
    }  

    .star {  
        position: absolute; width: 4px; height: 4px;  
        background: #fff; border-radius: 50%;  
        animation: twinkle 0.6s ease-in-out infinite; /* تم تسريع لمعان النجوم من 1.2 ثانية لـ 0.6 ثانية */  
        box-shadow: 0 0 10px #fff, 0 0 20px #ffd700;  
    }  

    @keyframes twinkle {  
        0%, 100% { opacity: 0.3; transform: scale(1); }  
        50% { opacity: 1; transform: scale(1.3); }  
    }  

    .butterflies {  
        position: absolute; width: 100%; height: 100%;  
        pointer-events: none; z-index: 1;  
    }  

    .butterfly {  
        position: absolute; font-size: 24px;  
        animation: butterflyFly 2.2s linear infinite; /* تم تسريع حركة الفراشات والإيموجيز من 5 ثواني لـ 2.2 ثانية */  
        opacity: 0.7;  
    }  

    @keyframes butterflyFly {  
        0% { transform: translateX(-100vw) translateY(0) rotate(0deg); opacity: 0; }  
        10% { opacity: 0.7; }  
        90% { opacity: 0.7; }  
        100% { transform: translateX(100vw) translateY(-100px) rotate(360deg); opacity: 0; }  
    }  

    .card {  
        background: rgba(255, 255, 255, 0.2);  
        backdrop-filter: blur(25px);  
        -webkit-backdrop-filter: blur(25px);  
        padding: 50px; border-radius: 40px;  
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(255, 107, 107, 0.3);  
        text-align: center; z-index: 2;  
        max-width: 450px; width: 90%;  
        border: 2px solid rgba(255, 255, 255, 0.4);  
        animation: cardPopIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);  
    }  

    .teddy-container {  
        width: 100%; margin-bottom: 35px;  
        position: relative; display: flex;  
        justify-content: center; perspective: 1000px;  
    }  

    .teddy-3d {  
        width: 240px; height: 240px;  
        position: relative; transform-style: preserve-3d;  
        animation: teddyRotate 1s ease-in-out infinite; /* تم تسريع دوران حركة الدبدوب الـ 3D من ثانيتين لثانية واحدة */  
    }  

    .teddy-face {  
        position: absolute; width: 100%; height: 100%;  
        background: linear-gradient(135deg, #e0c097, #b8956a);  
        border-radius: 50%; display: flex;  
        justify-content: center; align-items: center;  
        box-shadow: inset -15px -15px 30px rgba(0,0,0,0.25), 0 15px 40px rgba(0,0,0,0.35), 0 0 30px rgba(255, 193, 7, 0.4);  
        transform: translateZ(60px);  
    }  

    .teddy-ear {  
        position: absolute; width: 80px; height: 80px;  
        background: linear-gradient(135deg, #e0c097, #b8956a);  
        border-radius: 50%;  
        box-shadow: inset -8px -8px 20px rgba(0,0,0,0.25), 0 5px 15px rgba(0,0,0,0.3);  
    }  
    .ear-left { top: -25px; left: 15px; transform: translateZ(40px); }  
    .ear-right { top: -25px; right: 15px; transform: translateZ(40px); }  

    .teddy-eye {  
        position: absolute; width: 30px; height: 30px;  
        background: radial-gradient(circle, #4a3728, #1a0f0a);  
        border-radius: 50%; top: 75px;  
        box-shadow: 0 5px 15px rgba(0,0,0,0.4), 0 0 10px rgba(255, 255, 255, 0.5);  
    }  
    .eye-left { left: 55px; }  
    .eye-right { right: 55px; }  

    .teddy-nose {  
        position: absolute; width: 50px; height: 35px;  
        background: linear-gradient(to bottom, #8b4513, #5c3317);  
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;  
        top: 105px; box-shadow: 0 8px 20px rgba(0,0,0,0.3);  
    }  

    .teddy-mouth {  
        position: absolute; width: 70px; height: 35px;  
        border-bottom: 6px solid #5c3317;  
        border-radius: 0 0 50% 50%; top: 140px;  
    }  

    .teddy-heart {  
        position: absolute; width: 60px; height: 60px;  
        background: linear-gradient(45deg, #ff6b6b, #ff9a9e);  
        transform: rotate(-45deg); bottom: 35px; left: 50%;  
        transform: translateX(-50%) rotate(-45deg);  
        box-shadow: 0 0 30px rgba(255, 107, 107, 0.8), 0 0 50px rgba(255, 107, 107, 0.5);  
        animation: heartBeat 0.35s ease-in-out infinite; /* تم تسريع نبض القلب من 0.6 لـ 0.35 ثانية ليصبح حماسي ومتناسق */  
    }  

    .teddy-heart:before, .teddy-heart:after {  
        content: ""; position: absolute;  
        width: 60px; height: 60px;  
        background: linear-gradient(45deg, #ff6b6b, #ff9a9e);  
        border-radius: 50%;  
    }  
    .teddy-heart:before { top: -30px; left: 0; }  
    .teddy-heart:after { left: 30px; top: 0; }  

    .message {  
        font-size: 4.5rem; font-weight: 700; color: #fff;  
        text-shadow: 0 0 15px #fff, 0 0 30px #fff, 0 0 45px #ff6b6b, 0 0 60px #ff6b6b, 0 0 80px #ff6b6b, 0 0 100px #ff6b6b;  
        margin-bottom: 15px; letter-spacing: 3px;  
        animation: textGlow 0.8s ease-in-out infinite alternate; /* تم تسريع توهج النص والوميض من 1.5 ثانية لـ 0.8 ثانية */  
    }  

    @keyframes cardPopIn {  
        0% { transform: scale(0.6); opacity: 0; }  
        100% { transform: scale(1); opacity: 1; }  
    }  

    @keyframes teddyRotate {  
        0%, 100% { transform: rotateY(-20deg) rotateX(8deg); }  
        50% { transform: rotateY(20deg) rotateX(-8deg); }  
    }  

    @keyframes heartBeat {  
        0%, 100% { transform: translateX(-50%) rotate(-45deg) scale(1); }  
        50% { transform: translateX(-50%) rotate(-45deg) scale(1.2); }  
    }  

    @keyframes textGlow {  
        0%, 100% { text-shadow: 0 0 15px #fff, 0 0 30px #fff, 0 0 45px #ff6b6b, 0 0 60px #ff6b6b, 0 0 80px #ff6b6b; }  
        50% { text-shadow: 0 0 25px #fff, 0 0 50px #fff, 0 0 75px #ff6b6b, 0 0 100px #ff6b6b, 0 0 125px #ff6b6b, 0 0 150px #ff6b6b; }  
    }  

    .music-btn {  
        position: fixed; bottom: 30px; right: 30px;  
        width: 60px; height: 60px;  
        background: linear-gradient(135deg, #ff6b6b, #ff9a9e);  
        border-radius: 50%; display: flex;  
        justify-content: center; align-items: center;  
        cursor: pointer; z-index: 10;  
        box-shadow: 0 0 30px rgba(255, 107, 107, 0.6);  
        animation: pulse 1s ease-in-out infinite; /* تم تسريع نبض زر الموسيقى لـ ثانية واحدة */  
        border: 3px solid rgba(255, 255, 255, 0.5);  
    }  
    .music-btn:hover { transform: scale(1.1); }  
    .music-icon { font-size: 30px; color: #fff; }  

    @keyframes pulse {  
        0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 107, 107, 0.6); }  
        50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 107, 107, 0.9); }  
    }  
    </style>
</head>  
<body>  
    <div class="hearts-bg" id="heartsContainer"></div>  
    <div class="stars" id="starsContainer"></div>
    <div class="butterflies" id="butterfliesContainer"></div>

    <!-- تم تعديل اسم الملف وامتداده هنا بناءً على طلبك ليعمل فوراً -->
    <audio id="musicPlayer" loop>
        <source src="cut_temp.wav" type="audio/x-wav">
        <source src="cut_temp.wav" type="audio/wav">
    </audio>

    <div class="music-btn" onclick="toggleMusic()">
        <div class="music-icon" id="musicIcon">🎵</div>
    </div>

    <div class="card">  
        <div class="teddy-container">  
            <div class="teddy-3d">
                <div class="teddy-ear ear-left"></div>
                <div class="teddy-ear ear-right"></div>
                <div class="teddy-face">
                    <div class="teddy-eye eye-left"></div>
                    <div class="teddy-eye eye-right"></div>
                    <div class="teddy-nose"></div>
                    <div class="teddy-mouth"></div>
                    <div class="teddy-heart"></div>
                </div>
            </div>
        </div>  
        <div class="message">I love you</div>  
    </div>  

    <script>  
        const container = document.getElementById('heartsContainer');  
        for (let i = 0; i < 30; i++) {  
            const heart = document.createElement('div');  
            heart.classList.add('heart');  
            heart.style.left = Math.random() * 100 + 'vw';  
            heart.style.animationDelay = Math.random() * 1 + 's'; /* تم تسريع تتابع ظهور القلوب */  
            heart.style.animationDuration = (Math.random() * 0.6 + 0.8) + 's'; /* تسريع عشوائية الصعود للقلوب الناتجة بالـ JS */
            const size = (Math.random() * 18) + 12;  
            heart.style.width = size + 'px';  
            heart.style.height = size + 'px';  
            container.appendChild(heart);  
        }  

        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDelay = Math.random() * 0.5 + 's';
            starsContainer.appendChild(star);
        }

        const butterfliesContainer = document.getElementById('butterfliesContainer');
        const butterflies = ['🦋', '💕', '✨', '💖'];
        for (let i = 0; i < 12; i++) {
            const butterfly = document.createElement('div');
            butterfly.classList.add('butterfly');
            butterfly.textContent = butterflies[Math.floor(Math.random() * butterflies.length)];
            butterfly.style.top = (Math.random() * 80 + 10) + 'vh';
            butterfly.style.animationDelay = (Math.random() * 1.5) + 's';
            butterfly.style.animationDuration = (Math.random() * 1 + 1.5) + 's'; /* تسريع طيران الفراشات العشوائية */
            butterfly.style.fontSize = (Math.random() * 12 + 20) + 'px';
            butterfliesContainer.appendChild(butterfly);
        }

        let isPlaying = false;
        const musicPlayer = document.getElementById('musicPlayer');
        const musicIcon = document.getElementById('musicIcon');

        function toggleMusic() {
            if (isPlaying) {
                musicPlayer.pause();
                musicIcon.textContent = '🎵';
                musicPlayer.volume = 0;
            } else {
                musicPlayer.play();
                musicPlayer.volume = 0.7;
                musicIcon.textContent = '🔇';
            }
            isPlaying = !isPlaying;
        }

        document.addEventListener('click', function() {
            if (!isPlaying) {
                musicPlayer.play().then(() => {
                    isPlaying = true;
                    musicIcon.textContent = '🔇';
                    musicPlayer.volume = 0.7;
                }).catch(e => console.log('Auto-play prevented'));
            }
        }, { once: true });

        window.addEventListener('load', () => {
            musicPlayer.volume = 0.7;
        });
    </script>
</body>  
</html>
