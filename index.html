<!DOCTYPE html>
<html lang="ar">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>For You 🧸❤️</title>  
    <link rel="preconnect" href="https://fonts.googleapis.com">  
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Saira:wght@700;800&display=swap" rel="stylesheet">  
    <style>  
    * { margin: 0; padding: 0; box-sizing: border-box; }  

    body {  
        display: flex;  
        justify-content: center;  
        align-items: center;  
        min-height: 100vh;  
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);  
        overflow: hidden;  
        position: relative;  
        font-family: 'Great Vibes', cursive;  
    }  

    .hearts-bg {  
        position: absolute; width: 100%; height: 100%; top: 0; left: 0;  
        pointer-events: none; z-index: 1;  
    }  

    .heart {  
        position: absolute;  
        background: linear-gradient(45deg, #ff6b6b, #ff9a9e);  
        height: 22px; width: 22px;  
        transform: rotate(-45deg); bottom: -50px;  
        border-radius: 50% 50% 0 0;  
        animation: floatUp 0.8s linear infinite; /* طيران فائق السرعة */  
        opacity: 0.8;  
        box-shadow: 0 0 15px rgba(255, 107, 107, 0.6);  
    }  

    .heart:before, .heart:after {  
        content: ""; background: linear-gradient(45deg, #ff6b6b, #ff9a9e);  
        border-radius: 50%; height: 22px; position: absolute; width: 22px;  
    }  
    .heart:before { top: -11px; left: 0; }  
    .heart:after { left: 11px; top: 0; }  

    @keyframes floatUp {  
        0% { transform: translateY(0) rotate(-45deg) scale(0.8); opacity: 0; }  
        15% { opacity: 0.8; }
        100% { transform: translateY(-110vh) rotate(-45deg) scale(1.2); opacity: 0; }  
    }  

    .stars {  
        position: absolute; width: 100%; height: 100%;  
        pointer-events: none; z-index: 1;  
    }  

    .star {  
        position: absolute; width: 4px; height: 4px;  
        background: #fff; border-radius: 50%;  
        animation: twinkle 0.4s ease-in-out infinite; /* وميض سريع جداً */  
        box-shadow: 0 0 10px #fff, 0 0 20px #ffd700;  
    }  

    @keyframes twinkle {  
        0%, 100% { opacity: 0.3; transform: scale(1); }  
        50% { opacity: 1; transform: scale(1.4); }  
    }  

    .butterflies {  
        position: absolute; width: 100%; height: 100%;  
        pointer-events: none; z-index: 1;  
    }  

    .butterfly {  
        position: absolute; font-size: 24px;  
        animation: butterflyFly 1.5s linear infinite; /* حركة الفراشات طيارة */  
        opacity: 0.8;  
    }  

    @keyframes butterflyFly {  
        0% { transform: translateX(-100vw) translateY(0) rotate(0deg); opacity: 0; }  
        15% { opacity: 0.8; }  
        85% { opacity: 0.8; }  
        100% { transform: translateX(100vw) translateY(-80px) rotate(360deg); opacity: 0; }  
    }  

    .card {  
        background: rgba(255, 255, 255, 0.2);  
        backdrop-filter: blur(20px);  
        -webkit-backdrop-filter: blur(20px);  
        padding: 50px; border-radius: 40px;  
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(255, 107, 107, 0.3);  
        text-align: center; z-index: 2;  
        max-width: 450px; width: 90%;  
        border: 2px solid rgba(255, 255, 255, 0.4);  
        animation: cardPopIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);  
    }  

    .teddy-container {  
        width: 100%; margin-bottom: 20px;  
        position: relative; display: flex;  
        justify-content: center; perspective: 1000px;  
    }  

    .teddy-3d {  
        width: 240px; height: 240px;  
        position: relative; transform-style: preserve-3d;  
        animation: teddyRotate 0.6s ease-in-out infinite; /* دوران فائق الحيوية للدبدوب */  
    }  

    .teddy-face {  
        position: absolute; width: 100%; height: 100%;  
        background: linear-gradient(135deg, #e0c097, #b8956a);  
        border-radius: 50%; display: flex;  
        justify-content: center; align-items: center;  
        box-shadow: inset -15px -15px 30px rgba(0,0,0,0.25), 0 15px 40px rgba(0,0,0,0.35), 0 0 30px rgba(255, 193, 7, 0.4);  
        transform: translateZ(60px);  
    }  

    .teddy-ear {  
        position: absolute; width: 80px; height: 80px;  
        background: linear-gradient(135deg, #e0c097, #b8956a);  
        border-radius: 50%;  
        box-shadow: inset -8px -8px 20px rgba(0,0,0,0.25), 0 5px 15px rgba(0,0,0,0.3);  
    }  
    .ear-left { top: -25px; left: 15px; transform: translateZ(40px); }  
    .ear-right { top: -25px; right: 15px; transform: translateZ(40px); }  

    .teddy-eye {  
        position: absolute; width: 30px; height: 30px;  
        background: radial-gradient(circle, #4a3728, #1a0f0a);  
        border-radius: 50%; top: 75px;  
        box-shadow: 0 5px 15px rgba(0,0,0,0.4), 0 0 10px rgba(255, 255, 255, 0.5);  
    }  
    .eye-left { left: 55px; }  
    .eye-right { right: 55px; }  

    .teddy-nose {  
        position: absolute; width: 50px; height: 35px;  
        background: linear-gradient(to bottom, #8b4513, #5c3317);  
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;  
        top: 105px; box-shadow: 0 8px 20px rgba(0,0,0,0.3);  
    }  

    .teddy-mouth {  
        position: absolute; width: 70px; height: 35px;  
        border-bottom: 6px solid #5c3317;  
        border-radius: 0 0 50% 50%; top: 140px;  
    }  

    .teddy-heart {  
        position: absolute; width: 60px; height: 60px;  
        background: linear-gradient(45deg, #ff6b6b, #ff9a9e);  
        transform: rotate(-45deg); bottom: 35px; left: 50%;  
        transform: translateX(-50%) rotate(-45deg);  
        box-shadow: 0 0 30px rgba(255, 107, 107, 0.8), 0 0 50px rgba(255, 107, 107, 0.5);  
        animation: heartBeat 0.22s ease-in-out infinite; /* نبض قلب حماسي وسريع جداً */  
    }  

    .teddy-heart:before, .teddy-heart:after {  
        content: ""; position: absolute;  
        width: 60px; height: 60px;  
        background: linear-gradient(45deg, #ff6b6b, #ff9a9e);  
        border-radius: 50%;  
    }  
    .teddy-heart:before { top: -30px; left: 0; }  
    .teddy-heart:after { left: 30px; top: 0; }  

    .message {  
        font-size: 2.2rem; /* scaled down for long text */ 
        font-weight: 800;
        font-family: 'Saira', 'Great Vibes', cursive;
        color: #fff;  
        text-shadow: 0 0 12px #fff, 0 0 24px #ff6b6b, 0 0 36px #ff6b6b;  
        margin-bottom: 20px; letter-spacing: 1px;  
        animation: textGlow 0.8s ease-in-out infinite alternate; /* وميض لطيف للنص */  
        line-height: 1.15;
    }  

    @keyframes cardPopIn {  
        0% { transform: scale(0.6); opacity: 0; }  
        100% { transform: scale(1); opacity: 1; }  
    }  

    @keyframes teddyRotate {  
        0%, 100% { transform: rotateY(-25deg) rotateX(10deg); }  
        50% { transform: rotateY(25deg) rotateX(-10deg); }  
    }  

    @keyframes heartBeat {  
        0%, 100% { transform: translateX(-50%) rotate(-45deg) scale(1); }  
        50% { transform: translateX(-50%) rotate(-45deg) scale(1.25); }  
    }  

    @keyframes textGlow {  
        0%, 100% { text-shadow: 0 0 12px #fff, 0 0 24px #ff6b6b; }  
        50% { text-shadow: 0 0 22px #fff, 0 0 44px #ff6b6b; }  
    }  

    .music-btn {  
        position: fixed; bottom: 30px; right: 30px;  
        width: 60px; height: 60px;  
        background: linear-gradient(135deg, #ff6b6b, #ff9a9e);  
        border-radius: 50%; display: flex;  
        justify-content: center; align-items: center;  
        cursor: pointer; z-index: 10;  
        box-shadow: 0 0 30px rgba(255, 107, 107, 0.6);  
        animation: pulse 0.7s ease-in-out infinite;  
        border: 3px solid rgba(255, 255, 255, 0.5);  
    }  
    .music-btn:hover { transform: scale(1.1); }  
    .music-icon { font-size: 30px; color: #fff; }  

    @keyframes pulse {  
        0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 107, 107, 0.6); }  
        50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 107, 107, 0.9); }  
    }

    /* GIFTS / 3D ITEMS */
    .gifts {
        display: flex;
        justify-content: center;
        gap: 18px;
        margin-top: 12px;
        transform-style: preserve-3d;
        perspective: 900px;
        align-items: flex-end;
    }

    .gift {
        width: 86px;
        height: 86px;
        transform-style: preserve-3d;
        position: relative;
        transition: transform 0.35s ease;
    }
    .gift:hover { transform: translateY(-8px) rotateX(6deg) rotateY(-6deg) scale(1.05); }

    /* RING */
    .ring-3d {
        display:flex; align-items:center; justify-content:center;
    }
    .ring-band {
        width: 64px; height: 64px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #fff 0%, #e9e9e9 12%, #c0b6a6 45%, #9a8f83 100%);
        box-shadow: 0 6px 18px rgba(0,0,0,0.35), inset 0 -6px 12px rgba(255,255,255,0.15);
        transform: rotateX(25deg) rotateY(-12deg) translateZ(18px);
        position: relative;
    }
    .ring-band:after {
        content:"";
        position:absolute; inset:10px;
        border-radius:50%;
        background: radial-gradient(circle at 60% 40%, rgba(255,255,255,0.9), rgba(255,255,255,0.0) 35%);
        mix-blend-mode: overlay;
    }
    .ring-hands {
        position:absolute; width:100%; height:100%;
        transform: translateZ(34px) rotateX(10deg);
        left:0; top:0; pointer-events:none;
    }
    /* tiny hugging hands detail */
    .ring-hands:before, .ring-hands:after {
        content:""; position:absolute; width:26px; height:10px; border-radius:10px/6px;
        background: linear-gradient(135deg,#b7a89b,#8b796a);
        left:8px; top:20px; transform: rotate(-25deg);
        box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }
    .ring-hands:after { right:8px; left:auto; transform: rotate(25deg); }

    /* ROSE - stylized */
    .rose-3d {
        width: 86px; height:86px; position:relative; transform-style: preserve-3d;
    }
    .rose-stem {
        position:absolute; left:44%; bottom:6px; width:6px; height:50px; background: linear-gradient(#2f8b3a,#1c5f26);
        transform: rotate(-10deg) translateZ(4px);
        border-radius:4px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .rose-bud {
        position:absolute; left:50%; top:18px; width:66px; height:66px; transform: translateX(-50%) translateZ(18px) rotateX(12deg);
        border-radius:50%;
        background:
          radial-gradient(circle at 30% 30%, #ffd6e0 0%, #ffb3c4 18%, #ff8bb0 40%, #ff6b91 70%),
          radial-gradient(circle at 70% 60%, rgba(255,255,255,0.25), rgba(255,255,255,0) 30%);
        box-shadow: 0 8px 22px rgba(255,100,140,0.12), inset -6px -6px 12px rgba(0,0,0,0.12);
        overflow: visible;
    }
    /* petals - decorative */
    .rose-bud:before, .rose-bud:after {
        content:"";
        position:absolute; width:46px; height:46px; border-radius:50%;
        background: radial-gradient(circle at 40% 30%, #fff4f7, #ff8bb0 50%, #ff6b91 95%);
        transform-origin:center;
    }
    .rose-bud:before { left:-6px; top:6px; transform: rotate(-18deg); opacity:0.95; }
    .rose-bud:after { right:-6px; top:12px; transform: rotate(16deg); opacity:0.95; }

    /* CANDY BAG */
    .candy-bag-3d {
        width: 86px; height:96px; position:relative; transform-style: preserve-3d;
    }
    .bag {
        position:absolute; left:50%; top:8px; width:76px; height:84px; transform: translateX(-50%) translateZ(16px) rotateX(8deg);
        background: linear-gradient(180deg, rgba(200,245,255,0.95), rgba(170,225,245,0.9));
        border-radius: 8px 8px 12px 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.18), inset 0 -12px 20px rgba(255,255,255,0.45);
        overflow: visible;
        border: 2px solid rgba(255,255,255,0.4);
    }
    .bag-top {
        position:absolute; left:6px; right:6px; top:-8px; height:18px; background: linear-gradient(180deg,#bfeef7,#9fdff0);
        border-radius: 6px; transform: translateZ(26px);
        box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    }
    .candy {
        position:absolute; width:16px; height:16px; border-radius:50%;
        box-shadow: 0 3px 6px rgba(0,0,0,0.2), inset 0 -4px rgba(255,255,255,0.35);
    }
    .candy.c1 { left:18px; top:34px; background: linear-gradient(180deg,#ff6b6b,#ff9a9e); transform: translateZ(18px); }
    .candy.c2 { left:40px; top:28px; background: linear-gradient(180deg,#ffd166,#ffb86b); transform: translateZ(22px); }
    .candy.c3 { left:30px; top:48px; background: linear-gradient(180deg,#7be495,#35c18a); transform: translateZ(16px); }
    .candy.c4 { left:52px; top:50px; background: linear-gradient(180deg,#95a6ff,#6b7bff); transform: translateZ(14px); }

    /* TICKET */
    .ticket-3d {
        width:100px; height:68px; position:relative; transform-style: preserve-3d; transform: rotateX(8deg) translateZ(10px);
    }
    .ticket {
        width:100%; height:100%; border-radius:10px; background: linear-gradient(180deg,#fffaf0,#f2e6d8);
        box-shadow: 0 8px 20px rgba(0,0,0,0.18);
        border: 2px solid rgba(0,0,0,0.06);
        position:relative; overflow:hidden;
    }
    .ticket:before {
        content:""; position:absolute; right:0; top:0; width:28px; height:28px; background: linear-gradient(180deg,#e9d6c0,#d8c3a8);
        transform: rotate(15deg) translate(8px,-8px); opacity:0.9;
        border-radius: 6px;
    }
    .ticket .title { font-weight:800; color:#0b486b; font-size:13px; margin-top:8px; }
    .ticket .price { position:absolute; top:8px; left:8px; background:#0b7aa3; color:#fff; padding:4px 8px; border-radius:8px; font-weight:700; font-size:12px; }
    .ticket .qr { position:absolute; right:8px; bottom:8px; width:28px; height:28px; background: repeating-linear-gradient(90deg,#000 0 2px, #fff 2px 4px); opacity:0.12; border-radius:4px; }

    /* small responsive tweaks */
    @media (max-width:420px){
        .card { padding:28px; border-radius:30px; }
        .message { font-size:1.2rem; }
        .gifts { gap:10px; }
        .gift { width:66px; height:66px; }
        .ticket-3d { width:84px; height:58px; }
    }

    </style>
</head>  
<body>  
    <div class="hearts-bg" id="heartsContainer"></div>  
    <div class="stars" id="starsContainer"></div>
    <div class="butterflies" id="butterfliesContainer"></div>

    <!-- مشغل الصوت الأساسي والموسيقى الاحتياطية -->
    <audio id="musicPlayer">
        <source src="cut_temp.wav" type="audio/wav">
    </audio>

    <div class="music-btn" onclick="toggleMusic()">
        <div class="music-icon" id="musicIcon">🎵</div>
    </div>

    <div class="card">  
        <div class="teddy-container">  
            <div class="teddy-3d" aria-hidden="true">
                <div class="teddy-ear ear-left"></div>
                <div class="teddy-ear ear-right"></div>
                <div class="teddy-face">
                    <div class="teddy-eye eye-left"></div>
                    <div class="teddy-eye eye-right"></div>
                    <div class="teddy-nose"></div>
                    <div class="teddy-mouth"></div>
                    <div class="teddy-heart"></div>
                </div>
            </div>
        </div>  
        <div class="message">I'm sorry my lil baby I always do mistakes , but I know you are kind-hearted and you will forgive me</div>  

        <!-- GIFTS: ring, rose, candy bag, ticket -->
        <div class="gifts" aria-hidden="false">
            <div class="gift ring-3d" title="خاتم">
                <div class="ring-band" role="img" aria-label="خاتم ذهب صغير"></div>
                <div class="ring-hands" aria-hidden="true"></div>
            </div>

            <div class="gift rose-3d" title="ورد">
                <div class="rose-stem" aria-hidden="true"></div>
                <div class="rose-bud" role="img" aria-label="وردة وردية"></div>
            </div>

            <div class="gift candy-bag-3d" title="كاندي">
                <div class="bag" role="img" aria-label="كيس كاندي لبني">
                    <div class="bag-top"></div>
                    <div class="candy c1" aria-hidden="true"></div>
                    <div class="candy c2" aria-hidden="true"></div>
                    <div class="candy c3" aria-hidden="true"></div>
                    <div class="candy c4" aria-hidden="true"></div>
                </div>
            </div>

            <div class="gift ticket-3d" title="تذكرة">
                <div class="ticket" role="img" aria-label="تذكرة المنتزه">
                    <div class="price">65 L.E</div>
                    <div class="title" style="padding-top:10px;">Montazah Gardens</div>
                    <div class="qr"></div>
                </div>
            </div>
        </div>
    </div>  

    <script>  
        // تحسين الأداء بتقليل العدد وزيادة سرعة توليد القلوب
        const container = document.getElementById('heartsContainer');  
        for (let i = 0; i < 18; i++) {  
            const heart = document.createElement('div');  
            heart.classList.add('heart');  
            heart.style.left = Math.random() * 100 + 'vw';  
            heart.style.animationDelay = Math.random() * 0.5 + 's';  
            heart.style.animationDuration = (Math.random() * 0.4 + 0.6) + 's'; 
            const size = (Math.random() * 14) + 12;  
            heart.style.width = size + 'px';  
            heart.style.height = size + 'px';  
            container.appendChild(heart);  
        }  

        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 30; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDelay = Math.random() * 0.3 + 's';
            starsContainer.appendChild(star);
        }

        const butterfliesContainer = document.getElementById('butterfliesContainer');
        const butterflies = ['🦋', '💕', '✨', '💖'];
        for (let i = 0; i < 8; i++) {
            const butterfly = document.createElement('div');
            butterfly.classList.add('butterfly');
            butterfly.textContent = butterflies[Math.floor(Math.random() * butterflies.length)];
            butterfly.style.top = (Math.random() * 80 + 10) + 'vh';
            butterfly.style.animationDelay = (Math.random() * 0.5) + 's';
            butterfly.style.animationDuration = (Math.random() * 0.5 + 1.2) + 's'; 
            butterfly.style.fontSize = (Math.random() * 8 + 20) + 'px';
            butterfliesContainer.appendChild(butterfly);
        }

        let isPlaying = false;
        let isBackupMusic = false;
        const musicPlayer = document.getElementById('musicPlayer');
        const musicIcon = document.getElementById('musicIcon');
        
        // رابط لموسيقى لوفي بيانو كيوت جداً وهادية تناسب ذوقك وتشتغل كخلفية بديلة تلقائياً
        const backupMusicUrl = "https://assets.mixkit.co/music/preview/mixkit-beautiful-dream-493.mp3";

        function toggleMusic() {
            if (isPlaying) {
                musicPlayer.pause();
                musicIcon.textContent = '🎵';
            } else {
                musicPlayer.play().catch(e => console.log("Error playing"));
                musicPlayer.volume = 0.6;
                musicIcon.textContent = '🔇';
            }
            isPlaying = !isPlaying;
        }

        // السحر هنا: كود يراقب انتهاء الأغنية الأولى ويشغل الكيوت تلقائياً وبشكل مستمر لـ Loop
        musicPlayer.addEventListener('ended', function() {
            if (!isBackupMusic) {
                musicPlayer.src = backupMusicUrl;
                musicPlayer.loop = true; // عشان تفضل شغالة علطول
                musicPlayer.load();
                musicPlayer.play();
                isBackupMusic = true;
            }
        });

        document.addEventListener('click', function() {
            if (!isPlaying) {
                musicPlayer.play().then(() => {
                    isPlaying = true;
                    musicIcon.textContent = '🔇';
                    musicPlayer.volume = 0.6;
                }).catch(e => console.log('Auto-play blocked initially'));
            }
        }, { once: true });
    </script>
</body>  
</html>
