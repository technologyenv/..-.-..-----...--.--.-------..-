<!DOCTYPE html>
<html lang="ar">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>For You Nono 🧸❤️</title>  
    <link rel="preconnect" href="https://fonts.googleapis.com">  
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@600&display=swap" rel="stylesheet">  
    <style>  
    * { margin: 0; padding: 0; box-sizing: border-box; }  

    body {  
        display: flex;  
        justify-content: center;  
        align-items: center;  
        min-height: 100vh;  
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);  
        overflow: hidden;  
        position: relative;  
        font-family: 'Poppins', sans-serif;  
    }  

    .hearts-bg {  
        position: absolute; width: 100%; height: 100%; top: 0; left: 0;  
        pointer-events: none; z-index: 1;  
    }  

    .heart {  
        position: absolute;  
        background: linear-gradient(45deg, #ff6b6b, #ff9a9e);  
        height: 22px; width: 22px;  
        transform: rotate(-45deg); bottom: -50px;  
        border-radius: 50% 50% 0 0;  
        animation: floatUp 0.8s linear infinite;  
        opacity: 0.8;  
        box-shadow: 0 0 15px rgba(255, 107, 107, 0.6);  
    }  

    .heart:before, .heart:after {  
        content: ""; background: linear-gradient(45deg, #ff6b6b, #ff9a9e);  
        border-radius: 50%; height: 22px; position: absolute; width: 22px;  
    }  
    .heart:before { top: -11px; left: 0; }  
    .heart:after { left: 11px; top: 0; }  

    @keyframes floatUp {  
        0% { transform: translateY(0) rotate(-45deg) scale(0.8); opacity: 0; }  
        15% { opacity: 0.8; }  
        100% { transform: translateY(-110vh) rotate(-45deg) scale(1.2); opacity: 0; }  
    }  

    .stars { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 1; }  
    .star {  
        position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%;  
        animation: twinkle 0.4s ease-in-out infinite; box-shadow: 0 0 10px #fff, 0 0 20px #ffd700;  
    }  

    @keyframes twinkle {  
        0%, 100% { opacity: 0.3; transform: scale(1); }  
        50% { opacity: 1; transform: scale(1.4); }  
    }  

    .butterflies { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 1; }  
    .butterfly { position: absolute; font-size: 24px; animation: butterflyFly 1.5s linear infinite; opacity: 0.8; }  

    @keyframes butterflyFly {  
        0% { transform: translateX(-100vw) translateY(0) rotate(0deg); opacity: 0; }  
        15% { opacity: 0.8; }  
        85% { opacity: 0.8; }  
        100% { transform: translateX(100vw) translateY(-80px) rotate(360deg); opacity: 0; }  
    }  

    /* الكارت مع ميزة السكرول الداخلي الأنيق للهدايا */
    .card {  
        background: rgba(255, 255, 255, 0.2);  
        backdrop-filter: blur(20px);  
        -webkit-backdrop-filter: blur(20px);  
        padding: 40px 30px; border-radius: 40px;  
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(255, 107, 107, 0.3);  
        text-align: center; z-index: 2;  
        max-width: 460px; width: 92%; max-height: 85vh; overflow-y: auto;  
        border: 2px solid rgba(255, 255, 255, 0.4);  
        animation: cardPopIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);  
    }  

    /* إخفاء شريط السكرول التقليدي لإعطاء مظهر جمالي */
    .card::-webkit-scrollbar { width: 6px; }
    .card::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.4); border-radius: 10px; }

    .teddy-container {  
        width: 100%; margin-bottom: 25px;  
        position: relative; display: flex; justify-content: center; perspective: 1000px;  
    }  

    .teddy-3d {  
        width: 200px; height: 200px;  
        position: relative; transform-style: preserve-3d;  
        animation: teddyRotate 0.6s ease-in-out infinite;  
    }  

    .teddy-face {  
        position: absolute; width: 100%; height: 100%;  
        background: linear-gradient(135deg, #e0c097, #b8956a);  
        border-radius: 50%; display: flex; justify-content: center; align-items: center;  
        box-shadow: inset -15px -15px 30px rgba(0,0,0,0.25), 0 15px 40px rgba(0,0,0,0.35);  
        transform: translateZ(60px);  
    }  

    .teddy-ear {  
        position: absolute; width: 65px; height: 65px;  
        background: linear-gradient(135deg, #e0c097, #b8956a); border-radius: 50%;  
    }  
    .ear-left { top: -20px; left: 10px; transform: translateZ(40px); }  
    .ear-right { top: -20px; right: 10px; transform: translateZ(40px); }  

    .teddy-eye {  
        position: absolute; width: 24px; height: 24px;  
        background: radial-gradient(circle, #4a3728, #1a0f0a); border-radius: 50%; top: 65px;  
    }  
    .eye-left { left: 45px; }  
    .eye-right { right: 45px; }  

    .teddy-nose {  
        position: absolute; width: 40px; height: 28px;  
        background: linear-gradient(to bottom, #8b4513, #5c3317); border-radius: 50%; top: 90px;  
    }  

    .teddy-mouth {  
        position: absolute; width: 55px; height: 25px;  
        border-bottom: 5px solid #5c3317; border-radius: 0 0 50% 50%; top: 115px;  
    }  

    .teddy-heart {  
        position: absolute; width: 50px; height: 50px;  
        background: linear-gradient(45deg, #ff6b6b, #ff9a9e);  
        transform: rotate(-45deg); bottom: 25px; left: 50%;  
        transform: translateX(-50%) rotate(-45deg);  
        animation: heartBeat 0.22s ease-in-out infinite;  
    }  
    .teddy-heart:before, .teddy-heart:after {  
        content: ""; position: absolute; width: 50px; height: 50px;  
        background: linear-gradient(45deg, #ff6b6b, #ff9a9e); border-radius: 50%;  
    }  
    .teddy-heart:before { top: -25px; left: 0; }  
    .teddy-heart:after { left: 25px; top: 0; }  

    /* تنسيق نص الاعتذار الجديد الأنيق والأثقل */
    .message {  
        font-family: 'Great Vibes', cursive;
        font-size: 2.5rem; font-weight: 800; color: #fff;  
        text-shadow: 0 0 10px #fff, 0 0 20px #ff6b6b, 0 0 40px #ff6b6b;  
        margin-bottom: 30px; line-height: 1.3; direction: ltr;
        animation: textGlow 0.4s ease-in-out infinite alternate;  
    }  

    .divider {
        height: 2px; background: rgba(255,255,255,0.2); margin: 25px 0; width: 100%;
    }

    /* ---- 1. مجسم خاتم الحضن 3D CSS ---- */
    .ring-3d {
        width: 120px; height: 120px; margin: 20px auto; position: relative;
        perspective: 600px; animation: itemFloat 1s ease-in-out infinite alternate;
    }
    .ring-body {
        width: 80px; height: 80px; border: 8px solid #e0e0e0; border-radius: 50%;
        position: absolute; top: 20px; left: 20px; transform: rotateX(60deg) rotateY(20deg);
        box-shadow: 0 10px 20px rgba(0,0,0,0.2), inset 0 0 10px #fff;
    }
    .ring-hand-1, .ring-hand-2 {
        position: absolute; width: 35px; height: 12px; background: linear-gradient(#f0f0f0, #b5b5b5);
        border-radius: 10px 0 0 10px;
    }
    .ring-hand-1 { top: 30px; left: 10px; transform: rotateZ(20deg); }
    .ring-hand-2 { bottom: 35px; right: 10px; transform: rotateZ(-160deg); }

    /* ---- 2. مجسم الوردة البينك 3D CSS ---- */
    .rose-3d {
        width: 100px; height: 130px; margin: 20px auto; position: relative;
        animation: itemFloat 1.2s ease-in-out infinite alternate;
    }
    .rose-petals {
        width: 50px; height: 50px; background: radial-gradient(#ff8fa3, #ff4d6d);
        border-radius: 50% 50% 0 50%; margin: 0 auto; transform: rotate(-45deg);
        box-shadow: 0 10px 15px rgba(255,77,109,0.4);
    }
    .rose-stem {
        width: 6px; height: 70px; background: #52b788; margin: -5px auto 0; border-radius: 3px;
    }
    .rose-leaf {
        width: 20px; height: 12px; background: #74c69d; border-radius: 50% 0 50% 0;
        position: absolute; left: 55px; top: 70px; transform: rotate(15deg);
    }

    /* ---- 3. كيس كاندي جيلي لبني 3D CSS ---- */
    .candy-bag-3d {
        width: 130px; height: 160px; margin: 20px auto; position: relative;
        background: rgba(173, 216, 230, 0.55); border: 3px solid #90e0ef;
        border-radius: 15px; backdrop-filter: blur(2px);
        box-shadow: 0 15px 25px rgba(0,0,0,0.15), inset 0 0 20px rgba(255,255,255,0.6);
        animation: itemFloat 0.9s ease-in-out infinite alternate;
        overflow: hidden; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; padding: 20px;
    }
    .jelly-candy {
        width: 20px; height: 20px; background: #ff4d6d; border-radius: 50% 50% 0 0;
        transform: rotate(-45deg); margin: 6px; opacity: 0.9; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .jelly-candy:before {
        content: ""; width: 20px; height: 20px; background: #ff4d6d; border-radius: 50%;
        position: absolute; top: -10px; left: 0;
    }
    .jelly-candy.yellow { background: #ffb703; }
    .jelly-candy.yellow:before { background: #ffb703; }

    /* ---- 4. تذكرة المنتزه 3D CSS ---- */
    .ticket-3d {
        width: 240px; height: 110px; margin: 25px auto; background: #fdfdfd;
        border-left: 12px solid #006d77; border-radius: 12px; position: relative;
        box-shadow: 0 15px 30px rgba(0,0,0,0.2); text-align: right; padding: 12px;
        direction: rtl; animation: itemFloat 1.1s ease-in-out infinite alternate;
    }
    .ticket-title { font-size: 1rem; color: #006d77; font-weight: bold; margin-bottom: 2px; }
    .ticket-sub { font-size: 0.65rem; color: #666; margin-bottom: 8px; }
    .ticket-info { display: flex; justify-content: space-between; font-size: 0.7rem; color: #333; margin-top: 15px; }
    .ticket-price { background: #006d77; color: #fff; padding: 2px 8px; border-radius: 5px; font-weight: bold; }

    /* أنيمشن طفو الهدايا بشكل كيوت */
    @keyframes itemFloat {
        0% { transform: translateY(0) rotate(0deg); }
        100% { transform: translateY(-8px) rotate(2deg); }
    }

    @keyframes cardPopIn { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }  
    @keyframes teddyRotate { 0%, 100% { transform: rotateY(-25deg) rotateX(10deg); } 50% { transform: rotateY(25deg) rotateX(-10deg); } }  
    @keyframes heartBeat { 0%, 100% { transform: translateX(-50%) rotate(-45deg) scale(1); } 50% { transform: translateX(-50%) rotate(-45deg) scale(1.25); } }  
    @keyframes textGlow {  
        0%, 100% { text-shadow: 0 0 10px #fff, 0 0 20px #ff6b6b; }  
        50% { text-shadow: 0 0 20px #fff, 0 0 35px #ff6b6b; }  
    }  

    .music-btn {  
        position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;  
        background: linear-gradient(135deg, #ff6b6b, #ff9a9e); border-radius: 50%;  
        display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 10;  
        box-shadow: 0 0 30px rgba(255, 107, 107, 0.6); animation: pulse 0.7s ease-in-out infinite;  
        border: 3px solid rgba(255, 255, 255, 0.5);  
    }  
    .music-icon { font-size: 30px; color: #fff; }  
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }  
    </style>
</head>  
<body>  
    <div class="hearts-bg" id="heartsContainer"></div>  
    <div class="stars" id="starsContainer"></div>
    <div class="butterflies" id="butterfliesContainer"></div>

    <audio id="musicPlayer">
        <source src="cut_temp.wav" type="audio/wav">
    </audio>

    <div class="music-btn" onclick="toggleMusic()">
        <div class="music-icon" id="musicIcon">🎵</div>
    </div>

    <!-- كارت المصالحة الإبداعي الشامل -->
    <div class="card">  
        <!-- 1. الدبدوب الـ 3D -->
        <div class="teddy-container">  
            <div class="teddy-3d">
                <div class="teddy-ear ear-left"></div>
                <div class="teddy-ear ear-right"></div>
                <div class="teddy-face">
                    <div class="teddy-eye eye-left"></div>
                    <div class="teddy-eye eye-right"></div>
                    <div class="teddy-nose"></div>
                    <div class="teddy-mouth"></div>
                    <div class="teddy-heart"></div>
                </div>
            </div>
        </div>  

        <!-- 2. نص الاعتذار المكتوب بعناية وخط أثقل -->
        <div class="message">
            I'm sorry my lil baby I always do mistakes , but I know you are kind-hearted and you will forgive me 🧸❤️
        </div>  

        <div class="divider"></div>

        <!-- 3. خاتم الحضن الفضي 3D -->
        <div class="ring-3d">
            <div class="ring-body"></div>
            <div class="ring-hand-1"></div>
            <div class="ring-hand-2"></div>
        </div>

        <div class="divider"></div>

        <!-- 4. الوردة البينك 3D -->
        <div class="rose-3d">
            <div class="rose-petals"></div>
            <div class="rose-stem"></div>
            <div class="rose-leaf"></div>
        </div>

        <div class="divider"></div>

        <!-- 5. كيس الجيلي كاندي اللبني 3D -->
        <div class="candy-bag-3d">
            <div class="jelly-candy"></div>
            <div class="jelly-candy yellow"></div>
            <div class="jelly-candy"></div>
            <div class="jelly-candy yellow"></div>
        </div>

        <div class="divider"></div>

        <!-- 6. تذكرة حدائق المنتزه الكيوت 3D -->
        <div class="ticket-3d">
            <div class="ticket-title">حدائق المنتزه</div>
            <div class="ticket-sub">تذكرة دخول شخص واحد - 2026</div>
            <div class="ticket-info">
                <span>رقم العضوية: N° 00093326</span>
                <span class="ticket-price">65 L.E</span>
            </div>
        </div>
    </div>  

    <script>  
        const container = document.getElementById('heartsContainer');  
        for (let i = 0; i < 18; i++) {  
            const heart = document.createElement('div');  
            heart.classList.add('heart');  
            heart.style.left = Math.random() * 100 + 'vw';  
            heart.style.animationDelay = Math.random() * 0.5 + 's';  
            heart.style.animationDuration = (Math.random() * 0.4 + 0.6) + 's'; 
            const size = (Math.random() * 14) + 12;  
            heart.style.width = size + 'px';  
            heart.style.height = size + 'px';  
            container.appendChild(heart);  
        }  

        const starsContainer = document.getElementById('starsContainer');
        for (let i = 0; i < 30; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDelay = Math.random() * 0.3 + 's';
            starsContainer.appendChild(star);
        }

        const butterfliesContainer = document.getElementById('butterfliesContainer');
        const butterflies = ['🦋', '💕', '✨', '💖'];
        for (let i = 0; i < 8; i++) {
            const butterfly = document.createElement('div');
            butterfly.classList.add('butterfly');
            butterfly.textContent = butterflies[Math.floor(Math.random() * butterflies.length)];
            butterfly.style.top = (Math.random() * 80 + 10) + 'vh';
            butterfly.style.animationDelay = (Math.random() * 0.5) + 's';
            butterfly.style.animationDuration = (Math.random() * 0.5 + 1.2) + 's'; 
            butterfly.style.fontSize = (Math.random() * 8 + 20) + 'px';
            butterfliesContainer.appendChild(butterfly);
        }

        let isPlaying = false;
        let isBackupMusic = false;
        const musicPlayer = document.getElementById('musicPlayer');
        const musicIcon = document.getElementById('musicIcon');
        
        const backupMusicUrl = "https://assets.mixkit.co/music/preview/mixkit-beautiful-dream-493.mp3";

        function toggleMusic() {
            if (isPlaying) {
                musicPlayer.pause();
                musicIcon.textContent = '🎵';
            } else {
                musicPlayer.play().catch(e => console.log("Error playing"));
                musicPlayer.volume = 0.6;
                musicIcon.textContent = '🔇';
            }
            isPlaying = !isPlaying;
        }

        musicPlayer.addEventListener('ended', function() {
            if (!isBackupMusic) {
                musicPlayer.src = backupMusicUrl;
                musicPlayer.loop = true;
                musicPlayer.load();
                musicPlayer.play();
                isBackupMusic = true;
            }
        });

        document.addEventListener('click', function() {
            if (!isPlaying) {
                musicPlayer.play().then(() => {
                    isPlaying = true;
                    musicIcon.textContent = '🔇';
                    musicPlayer.volume = 0.6;
                }).catch(e => console.log('Auto-play blocked initially'));
            }
        }, { once: true });
    </script>
</body>  
</html>
