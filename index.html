<!DOCTYPE html>
<html lang="ar">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>For You 🧸❤️</title>  
    <!-- استدعاء خط راقي من جوجل فونتس -->  
    <link rel="preconnect" href="https://fonts.googleapis.com">  
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
    <link href="https://fonts.googleapis.com/css2?family=Elegant+Script&display=swap" rel="stylesheet">  
    <style>  
    * {  
        margin: 0;  
        padding: 0;  
        box-sizing: border-box;  
    }  

    body {  
        display: flex;  
        justify-content: center;  
        align-items: center;  
        min-height: 100vh;  
        background: linear-gradient(135deg, #6e45e2, #88d3ce);  
        overflow: hidden;  
        position: relative;  
        font-family: 'Elegant Script', cursive;  
    }  

    /* قلوب الخلفية المتساقطة */  
    .hearts-bg {  
        position: absolute;  
        width: 100%;  
        height: 100%;  
        top: 0;  
        left: 0;  
        pointer-events: none;  
        z-index: 1;  
    }  

    .heart {  
        position: absolute;  
        background: linear-gradient(45deg, #ff6b6b, #ff9a9e);  
        display: inline-block;  
        height: 20px;  
        width: 20px;  
        transform: rotate(-45deg);  
        bottom: -50px;  
        border-radius: 50% 50% 0 0;  
        animation: floatUp 8s linear infinite;  
        opacity: 0.7;  
        box-shadow: 0 0 15px rgba(255, 107, 107, 0.5);  
    }  

    .heart:before, .heart:after {  
        content: "";  
        background: linear-gradient(45deg, #ff6b6b, #ff9a9e);  
        border-radius: 50%;  
        height: 20px;  
        position: absolute;  
        width: 20px;  
    }  

    .heart:before {  
        top: -10px;  
        left: 0;  
    }  

    .heart:after {  
        left: 10px;  
        top: 0;  
    }  

    @keyframes floatUp {  
        0% { 
            transform: translateY(0) rotate(-45deg) scale(0.8);
            opacity: 0; 
        }  
        50% { opacity: 0.8; }
        100% { 
            transform: translateY(-110vh) rotate(-45deg) scale(1.2);
            opacity: 0; 
        }  
    }  

    /* الكارت الرئيسي */  
    .card {  
        background: rgba(255, 255, 255, 0.15);  
        backdrop-filter: blur(20px);  
        -webkit-backdrop-filter: blur(20px);  
        padding: 40px;  
        border-radius: 35px;  
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);  
        text-align: center;  
        z-index: 2;  
        max-width: 420px;  
        width: 90%;  
        border: 1px solid rgba(255, 255, 255, 0.3);  
        animation: cardPopIn 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);  
    }  

    /* حاوية الدبدوب ثلاثي الأبعاد */  
    .teddy-container {  
        width: 100%;  
        margin-bottom: 30px;  
        position: relative;  
        display: flex;  
        justify-content: center;  
        perspective: 1000px;  
    }  

    .teddy-3d {  
        width: 220px;  
        height: 220px;  
        position: relative;  
        transform-style: preserve-3d;  
        animation: teddyRotate 6s ease-in-out infinite;  
    }  

    .teddy-face {  
        position: absolute;  
        width: 100%;  
        height: 100%;  
        background: linear-gradient(135deg, #d4a574, #a67c52);  
        border-radius: 50%;  
        display: flex;  
        justify-content: center;  
        align-items: center;  
        box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2),
                    0 10px 30px rgba(0,0,0,0.3);
        transform: translateZ(50px);
    }

    .teddy-ear {
        position: absolute;
        width: 70px;
        height: 70px;
        background: linear-gradient(135deg, #d4a574, #a67c52);
        border-radius: 50%;
        box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2);
    }

    .ear-left {
        top: -20px;
        left: 20px;
        transform: translateZ(30px);
    }

    .ear-right {
        top: -20px;
        right: 20px;
        transform: translateZ(30px);
    }

    .teddy-eye {
        position: absolute;
        width: 25px;
        height: 25px;
        background: radial-gradient(circle, #333, #000);
        border-radius: 50%;
        top: 70px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.3);
    }

    .eye-left {
        left: 60px;
    }

    .eye-right {
        right: 60px;
    }

    .teddy-nose {
        position: absolute;
        width: 40px;
        height: 30px;
        background: linear-gradient(to bottom, #8b4513, #5c3317);
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        top: 100px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .teddy-mouth {
        position: absolute;
        width: 60px;
        height: 30px;
        border-bottom: 5px solid #5c3317;
        border-radius: 0 0 50% 50%;
        top: 130px;
    }

    .teddy-heart {
        position: absolute;
        width: 50px;
        height: 50px;
        background: linear-gradient(45deg, #ff6b6b, #ff9a9e);
        transform: rotate(-45deg);
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%) rotate(-45deg);
        box-shadow: 0 0 20px rgba(255, 107, 107, 0.6);
        animation: heartBeat 1.5s ease-in-out infinite;
    }

    .teddy-heart:before, .teddy-heart:after {
        content: "";
        position: absolute;
        width: 50px;
        height: 50px;
        background: linear-gradient(45deg, #ff6b6b, #ff9a9e);
        border-radius: 50%;
    }

    .teddy-heart:before {
        top: -25px;
        left: 0;
    }

    .teddy-heart:after {
        left: 25px;
        top: 0;
    }

    /* النص المتوهج */  
    .message {  
        font-size: 3.5rem;  
        color: #fff;  
        text-shadow: 0 0 10px #fff,
                     0 0 20px #fff,
                     0 0 30px #ff6b6b,
                     0 0 40px #ff6b6b,
                     0 0 50px #ff6b6b;
        margin-bottom: 10px;  
        letter-spacing: 2px;  
        animation: textGlow 3s ease-in-out infinite alternate;  
    }  

    /* الأنيميشن */  
    @keyframes cardPopIn {  
        0% { transform: scale(0.7); opacity: 0; }  
        100% { transform: scale(1); opacity: 1; }  
    }  

    @keyframes teddyRotate {  
        0%, 100% { transform: rotateY(-15deg) rotateX(5deg); }  
        50% { transform: rotateY(15deg) rotateX(-5deg); }  
    }  

    @keyframes heartBeat {  
        0%, 100% { transform: translateX(-50%) rotate(-45deg) scale(1); }  
        50% { transform: translateX(-50%) rotate(-45deg) scale(1.1); }  
    }  

    @keyframes textGlow {  
        0%, 100% { 
            text-shadow: 0 0 10px #fff,
                         0 0 20px #fff,
                         0 0 30px #ff6b6b,
                         0 0 40px #ff6b6b;
        }  
        50% { 
            text-shadow: 0 0 15px #fff,
                         0 0 30px #fff,
                         0 0 45px #ff6b6b,
                         0 0 60px #ff6b6b,
                         0 0 75px #ff6b6b;
        }  
    }  
    </style>
</head>  
<body>  
    <div class="hearts-bg" id="heartsContainer"></div>  

    <div class="card">  
        <div class="teddy-container">  
            <div class="teddy-3d">
                <div class="teddy-ear ear-left"></div>
                <div class="teddy-ear ear-right"></div>
                <div class="teddy-face">
                    <div class="teddy-eye eye-left"></div>
                    <div class="teddy-eye eye-right"></div>
                    <div class="teddy-nose"></div>
                    <div class="teddy-mouth"></div>
                    <div class="teddy-heart"></div>
                </div>
            </div>
        </div>  
        <div class="message">I love you</div>  
    </div>  

    <script>  
        const container = document.getElementById('heartsContainer');  
        const totalHearts = 25;  

        for (let i = 0; i < totalHearts; i++) {  
            const heart = document.createElement('div');  
            heart.classList.add('heart');  
            heart.style.left = Math.random() * 100 + 'vw';  
            heart.style.animationDelay = Math.random() * 5 + 's';  
            heart.style.animationDuration = (Math.random() * 3 + 6) + 's';
              
            const size = (Math.random() * 15) + 10;  
            heart.style.width = size + 'px';  
            heart.style.height = size + 'px';  
              
            container.appendChild(heart);  
        }  
    </script>
</body>  
</html>
