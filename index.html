<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🧸❤️</title>
    <!-- استدعاء خط راقي ومميز من جوجل فونتس -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff0f3, #ffccd5);
            overflow: hidden;
            position: relative;
        }

        /* القلوب المتساقطة في الخلفية */
        .hearts-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            background-color: #ffb3c6;
            display: inline-block;
            height: 16px;
            margin: 0 10px;
            transform: rotate(-45deg);
            width: 16px;
            bottom: -50px;
            border-radius: 50% 50% 0 0;
            animation: floatUp 7s linear infinite;
            opacity: 0.6;
        }

        .heart:before {
            content: "";
            background-color: #ffb3c6;
            border-radius: 50%;
            height: 16px;
            position: absolute;
            width: 16px;
            top: -8px;
            left: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(-45deg); opacity: 0; }
            100% { transform: translateY(-110vh) rotate(-45deg); opacity: 0; }
        }

        /* كارت العرض النظيف والمودرن */
        .card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 77, 109, 0.15);
            text-align: center;
            z-index: 2;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: popIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* حاوية الدبدوب الـ 3D */
        .teddy-container {
            width: 100%;
            margin-bottom: 25px;
            position: relative;
            display: flex;
            justify-content: center;
            animation: gentleFloat 4s ease-in-out infinite;
        }

        .teddy-img {
            max-width: 220px;
            width: 100%;
            height: auto;
            border-radius: 20px;
            /* تأثير ظل خفيف تحت الدبدوب عشان يبان ثري دي وواقعي وسط الخلفية */
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        /* نص الرسالة بالخط الراقي الجديد */
        .message {
            font-family: 'Dancing Script', cursive;
            font-size: 3.2rem;
            color: #ff4d6d;
            margin-bottom: 5px;
            letter-spacing: 1px;
            animation: smoothPulse 2s infinite ease-in-out;
        }

        /* حركات الأنيميشن الناعمة */
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes smoothPulse {
            0%, 100% { transform: scale(1); opacity: 0.95; }
            50% { transform: scale(1.03); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- الخلفية المليانة قلوب متحركة -->
    <div class="hearts-bg" id="heartsContainer"></div>

    <!-- كارت الدبدوب والرسالة -->
    <div class="card">
        <div class="teddy-container">
            <!-- صورة الدبدوب الـ 3D الكيوت اللي ماسك قلب وتعبير وشه لطيف -->
            <img src="watermarked_img_8986450022820801147.png" alt="Cute 3D Teddy Bear" class="teddy-img">
        </div>
        
        <div class="message">I love you</div>
    </div>

    <script>
        // توليد قلوب الخلفية بشكل عشوائي وناعم
        const container = document.getElementById('heartsContainer');
        const totalHearts = 20;

        for (let i = 0; i < totalHearts; i++) {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDelay = Math.random() * 7 + 's';
            
            const size = (Math.random() * 12) + 8;
            heart.style.width = size + 'px';
            heart.style.height = size + 'px';
            
            container.appendChild(heart);
        }
    </script>
</body>
</html>
